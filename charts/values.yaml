replicaCount: 4

image:
  repository: "" # repository par défaut
  tag: ""                                     # tag par défaut
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

#service:
#  type: NodePort
#  port: 8080
#  nodePort: null   # uniquement si type=NodePort

service:
  type: LoadBalancer


env:
  DB_HOST: ""
  DB_PORT: ""
  DB_NAME: ""
  MYSQL_ROOT_USER: ""
  MYSQL_ROOT_PASSWORD: ""


autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
